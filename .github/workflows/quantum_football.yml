name: quantum-football-daily
on:
  schedule:
    - cron: "0 7 * * *"   # ogni giorno alle 7:00 UTC (9:00 ora italiana)
  workflow_dispatch:        # permette avvio manuale dal sito

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: |
          pip install requests qiskit qiskit-aer qiskit-ibm-runtime \
                      pandas numpy scikit-learn

      - name: Esegui previsioni quantistiche
        run: python quantum_predict.py
        env:
          API_FOOTBALL_KEY:  ${{ secrets.API_FOOTBALL_KEY }}
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:     ${{ secrets.TELEGRAM_CHAT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          SMTP_TO:           ${{ secrets.SMTP_TO }}

      - name: Salva risultati come artifact
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.run_number }}
          path: predictions_output.json
```

→ clicca **"Commit changes"**

