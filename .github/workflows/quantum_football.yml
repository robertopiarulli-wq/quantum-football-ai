## 🌐 FASE 5 — Pubblica la Dashboard (Vercel — gratis)

**5.1** Vai su **vercel.com** → Sign Up con il tuo account GitHub

**5.2** Clicca **"New Project"** → seleziona il tuo repo `quantum-football-ai`

**5.3** Nella configurazione seleziona:
- Framework: **Vite** (o Create React App)
- Root directory: lascia `/`

**5.4** Clicca **Deploy** → in 2 minuti ti dà un URL tipo:
`https://quantum-football-ai.vercel.app`

> ⚠️ Se Vercel da errore perché il file è `.jsx` standalone, crea prima un progetto Vite in locale con `npm create vite@latest` poi sostituisci `App.jsx` con il tuo file e fai push su GitHub.

---

## ▶️ FASE 6 — Primo Test Manuale

→ Nel tuo repo GitHub vai su **Actions** (menu in alto)
→ clicca sul workflow **"quantum-football-daily"**
→ clicca **"Run workflow"** → **"Run workflow"** (bottone verde)
→ aspetta ~2 minuti → se vedi ✅ verde funziona tutto
→ controlla Telegram e Email: dovresti ricevere gli alert!

