name: Quantum Football AI - Daily Predictions

"on":
  schedule:
    - cron: "0 7 * * *"   # ogni giorno alle 09:00 ora italiana (UTC+2)
  workflow_dispatch:        # permette esecuzione manuale da GitHub Actions

jobs:
  predict:
    name: Run Quantum Predictions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests numpy pandas scikit-learn qiskit qiskit-aer qiskit-ibm-runtime

      - name: Run quantum predictions
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: |
          python quantum_predict.py

      - name: Upload prediction results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: predictions-${{ github.run_number }}
          path: |
            predictions_output.json
            weights.json
          retention-days: 30
