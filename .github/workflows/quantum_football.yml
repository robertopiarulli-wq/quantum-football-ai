name: Quantum Football AI - Daily Predictions

"on":
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  predict:
    name: Run Quantum Predictions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests numpy

      - name: Run quantum predictions
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python quantum_predict_v3.py

      - name: Commit risultati nel repo
        run: |
          git config user.name "Quantum Football Bot"
          git config user.email "bot@quantum-football.ai"
          git add predictions_output.json weights.json fixtures_today.json || true
          git commit -m "🤖 Previsioni $(date '+%d/%m/%Y %H:%M')" || true
          git push || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.run_number }}
          path: |
            predictions_output.json
            weights.json
            fixtures_today.json
          retention-days: 30
          if-no-files-found: warn
