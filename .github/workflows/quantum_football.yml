name: Quantum Football AI - Daily Predictions

"on":
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  predict:
    name: Run Quantum Predictions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install required dependencies
        run: |
          pip install --upgrade pip
          pip install requests numpy

      - name: Install Qiskit (optional - fallback to classical if fails)
        run: |
          pip install qiskit==1.0.2 qiskit-aer==0.14.0 qiskit-ibm-runtime==0.20.0 || echo "⚠️ Qiskit non installato, verrà usato modello classico"

      - name: Run quantum predictions
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python quantum_predict.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.run_number }}
          path: |
            predictions_output.json
            weights.json
          retention-days: 30
          if-no-files-found: warn
